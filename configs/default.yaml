# YAML reference configuration. Runtime environment variables use the APP_ prefix.
symbols: [BTC, ETH, SOL]
timeframes: [1m, 5m, 15m, 1h, 4h, 1d]
paper_trading: true
live_trading: false
risk:
  leverage: 1.0
  max_risk_per_trade: 0.0025
  max_daily_loss: 0.01
  max_weekly_loss: 0.03
  max_drawdown: 0.08
  max_positions: 3
  max_consecutive_losses: 5
  max_gross_exposure: 1.0
  max_symbol_exposure: 0.35
  max_exchange_exposure: 0.50
  maximum_spread_bps: 50
  stale_data_seconds: 30
  cooldown_seconds: 900
regime:
  minimum_quality: 0.80
  minimum_confidence: 0.60
  z_extreme: 2.326
  z_severe: 3.0
backtest:
  initial_cash: 1000
  maker_fee_rate: 0.0002
  taker_fee_rate: 0.0006
  slippage_bps: 2
  market_impact_bps: 1
  signal_delay_ms: 50
  submission_delay_ms: 200
  maximum_participation: 0.10
  minimum_notional: 5
validation:
  training_observations: 1000
  validation_observations: 250
  test_observations: 250
  purge_observations: 5
  embargo_observations: 5
  monte_carlo_trials: 1000
  random_seed: 17
paper:
  enabled: true
  initial_cash: 1000
  fee_rate: 0.0006
  slippage_bps: 2
  maximum_participation: 0.10
live:
  enabled: false
  adapter_name: disabled
  allowed_symbols: [BTC, ETH, SOL]
  maximum_order_notional: 100
  maximum_open_orders: 3
  maximum_orders_per_minute: 5
  maximum_clock_skew_seconds: 2
  preflight_ttl_seconds: 30
  minimum_data_quality: 0.90
  withdrawal_permission_confirmed_disabled: true
