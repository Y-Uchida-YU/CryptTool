# YAML reference configuration. Runtime environment variables use the APP_ prefix.
symbols: [BTC, ETH, SOL]
timeframes: [1m, 5m, 15m, 1h, 4h, 1d]
paper_trading: true
live_trading: false
research_collection:
  collection_enabled: false
  venues: []
  instruments: [BTC, ETH, SOL, HYPE]
  event_types: [ohlcv, trade, orderbook_snapshot, orderbook_delta, funding_current, funding_history, open_interest, mark_price, index_price]
  poll_interval_seconds: 30
  stale_after_seconds: 120
risk:
  leverage: 1.0
  max_risk_per_trade: 0.0025
  max_daily_loss: 0.01
  max_weekly_loss: 0.03
  max_drawdown: 0.08
  max_positions: 3
  max_consecutive_losses: 5
  max_gross_exposure: 1.0
  max_symbol_exposure: 0.35
  max_exchange_exposure: 0.50
  maximum_spread_bps: 50
  stale_data_seconds: 30
  cooldown_seconds: 900
regime:
  minimum_quality: 0.80
  minimum_confidence: 0.60
  z_extreme: 2.326
  z_severe: 3.0
backtest:
  initial_cash: 1000
  maker_fee_rate: 0.0002
  taker_fee_rate: 0.0006
  slippage_bps: 2
  market_impact_bps: 1
  signal_delay_ms: 50
  submission_delay_ms: 200
  maximum_participation: 0.10
  minimum_notional: 5
validation:
  training_observations: 1000
  validation_observations: 250
  test_observations: 250
  purge_observations: 5
  embargo_observations: 5
  monte_carlo_trials: 1000
  random_seed: 17
paper:
  enabled: true
  initial_cash: 1000
  fee_rate: 0.0006
  slippage_bps: 2
  maximum_participation: 0.10
live:
  enabled: false
  adapter_name: disabled
  allowed_symbols: [BTC, ETH, SOL]
  maximum_order_notional: 100
  maximum_open_orders: 3
  maximum_orders_per_minute: 5
  maximum_clock_skew_seconds: 2
  preflight_ttl_seconds: 30
  minimum_data_quality: 0.90
  withdrawal_permission_confirmed_disabled: true
venues:
  hyperliquid: &priority_data_only
    data_enabled: true
    execution_enabled: false
    eligibility_status: data_only
    jurisdiction: JP
    terms_checked_at: "2026-07-12T00:00:00Z"
    api_market_data_available: true
    reason: "public data enabled; operator account, withdrawals and execution smoke unverified"
  aster:
    <<: *priority_data_only
    terms_version: "2026-02-25"
    reason: "official API and terms found; operator execution gates unverified"
  bitget:
    <<: *priority_data_only
    terms_version: "2026-02-04"
    reason: "Japan absent from current prohibited-country list; account verification required"
  mexc:
    <<: *priority_data_only
    terms_version: "2026-04-17"
    reason: "web/API eligibility requires verification; mobile apps unavailable in Japan"
  dydx:
    <<: *priority_data_only
    data_enabled: false
    experimental_recording_enabled: true
    reason: "DATA_ONLY: public Indexer/Full Node data; execution intentionally disabled"
  paradex:
    <<: *priority_data_only
    data_enabled: false
    experimental_recording_enabled: true
    reason: "DATA_ONLY: public market data; JWT/Subkey execution intentionally disabled"
  lighter:
    <<: *priority_data_only
    data_enabled: false
    experimental_recording_enabled: true
    reason: "EXPERIMENTAL_DATA_ONLY: emerging venue health monitoring required"
  gmo_coin:
    <<: *priority_data_only
    reason: "domestic public data"
  bitbank:
    <<: *priority_data_only
    reason: "domestic public data"
  bitflyer:
    <<: *priority_data_only
    reason: "domestic public data"
  btcc:
    data_enabled: false
    execution_enabled: false
    eligibility_status: pending_verification
    jurisdiction: JP
    terms_checked_at: "2026-07-12T00:00:00Z"
    reason: "PENDING_API_VERIFICATION: full private real-time and permission requirements unverified"
  gateio:
    data_enabled: false
    execution_enabled: false
    eligibility_status: pending_verification
    jurisdiction: JP
    terms_checked_at: "2026-07-12T00:00:00Z"
    reason: "DISCOVERY_ONLY: requires 30-day incremental value observation and operator verification"
  bybit: &jp_execution_forbidden
    data_enabled: false
    execution_enabled: false
    eligibility_status: disabled
    jurisdiction: JP
    terms_checked_at: "2026-07-12T00:00:00Z"
    requires_location_evasion: true
    reason: "execution adapter prohibited for Japan-resident operation"
  binance_global:
    <<: *jp_execution_forbidden
venue_risk:
  hyperliquid: {maximum_equity_fraction: 0.30}
  aster: {maximum_equity_fraction: 0.15}
  bitget: {maximum_equity_fraction: 0.20}
  mexc: {maximum_equity_fraction: 0.10}
  dydx: {maximum_equity_fraction: 0.10}
  paradex: {maximum_equity_fraction: 0.10}
  lighter: {maximum_equity_fraction: 0.05}
  domestic_exchanges: {maximum_equity_fraction: 0.40}
