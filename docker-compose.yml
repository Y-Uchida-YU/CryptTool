services:
  app:
    build: .
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
    command: ["validate-config"]
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cryptbot
      POSTGRES_USER: cryptbot
      POSTGRES_PASSWORD: change-me
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptbot -d cryptbot"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes: ["postgres-data:/var/lib/postgresql/data"]
volumes:
  postgres-data:
