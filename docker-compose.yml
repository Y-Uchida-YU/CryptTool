services:
  app:
    build: .
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_DATABASE_URL: postgresql+psycopg://cryptbot:${CRYPTBOT_DB_PASSWORD:-change-me}@db:5432/cryptbot
    command: ["health-check"]
  paper-operation:
    profiles: ["paper"]
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_DATABASE_URL: postgresql+psycopg://cryptbot:${CRYPTBOT_DB_PASSWORD:-change-me}@db:5432/cryptbot
      APP_PRODUCTION_DATABASE_URL: postgresql+psycopg://cryptbot:${CRYPTBOT_DB_PASSWORD:-change-me}@db:5432/cryptbot
      APP_LIVE_TRADING: "false"
      APP_LIVE__ENABLED: "false"
      APP_CONTINUOUS_PAPER__ENABLED: "true"
      APP_CONTINUOUS_PAPER__OBSERVATION_ONLY: "true"
    command: ["start-paper-operation", "--config", "configs/paper-operation.yaml"]
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cryptbot
      POSTGRES_USER: cryptbot
      POSTGRES_PASSWORD: ${CRYPTBOT_DB_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptbot -d cryptbot"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes: ["postgres-data:/var/lib/postgresql/data"]
volumes:
  postgres-data:
