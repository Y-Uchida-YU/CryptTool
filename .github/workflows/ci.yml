name: ci
on: [push, pull_request]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cryptbot_test
          POSTGRES_USER: cryptbot
          POSTGRES_PASSWORD: test-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cryptbot -d cryptbot_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      APP_DATABASE_URL: postgresql+psycopg://cryptbot:test-only-password@localhost:5432/cryptbot_test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
        with: {python-version: "3.12"}
      - run: uv sync --all-extras --frozen
      - run: uv run --frozen ruff check .
      - run: uv run --frozen ruff format --check .
      - run: uv run --frozen mypy
      - run: >-
          uv run --frozen pytest --cov --cov-report=term-missing
          --cov-report=json:coverage.json
          --junitxml=artifacts/build-verification/pytest.xml
      - run: uv run --frozen python scripts/check_coverage.py coverage.json
      - name: Generate build verification
        run: >-
          uv run --frozen python scripts/write_build_verification.py
          --coverage coverage.json
          --junit artifacts/build-verification/pytest.xml
          --output artifacts/build-verification/latest.json
          --commit-sha "${GITHUB_SHA}"
          --ci-run-id "${GITHUB_RUN_ID}"
      - name: Upload build verification artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-verification-${{ github.sha }}
          path: artifacts/build-verification/
          if-no-files-found: error
          retention-days: 30
      - run: uv run --frozen app audit-capabilities
      - name: Package capability audit artifact
        run: >-
          uv run --frozen python scripts/package_capability_audit.py
          --report artifacts/capability-audit/report.json
          --manifest artifacts/capability-audit/manifest.json
          --commit-sha "${GITHUB_SHA}"
      - name: Upload capability audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: capability-audit-${{ github.sha }}
          path: artifacts/capability-audit/
          if-no-files-found: error
          retention-days: 30
      - run: uv run --frozen alembic upgrade head && uv run --frozen alembic check
      - run: uv run --frozen bandit -r src
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
