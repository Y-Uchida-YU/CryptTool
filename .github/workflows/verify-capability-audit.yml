name: verify-capability-audit
on:
  workflow_run:
    workflows: [ci]
    branches: [main]
    types: [completed]
permissions:
  actions: read
  contents: read
jobs:
  deployment-artifact-verification:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: astral-sh/setup-uv@v4
        with: {python-version: "3.12"}
      - run: uv sync --frozen
      - uses: actions/download-artifact@v4
        with:
          name: capability-audit-${{ github.event.workflow_run.head_sha }}
          path: artifacts/capability-audit
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Verify deployment capability audit artifact
        run: >-
          uv run --frozen python scripts/verify_capability_audit_artifact.py
          --directory artifacts/capability-audit
          --commit-sha "${{ github.event.workflow_run.head_sha }}"
      - name: Confirm live execution remains disabled
        run: test "$(uv run --frozen python -c 'from app.config.settings import Settings; print(Settings(_env_file=None).live.enabled)')" = "False"
